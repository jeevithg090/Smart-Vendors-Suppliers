<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>Smart Street - Backend Connection Test</h1>
    
    <div id="convex-status" class="status info">
        Testing Convex connection...
    </div>
    
    <div id="results"></div>
    
    <script type="module">
        const CONVEX_URL = 'https://zany-ladybug-774.convex.cloud';
        
        async function testConnection() {
            const statusDiv = document.getElementById('convex-status');
            const resultsDiv = document.getElementById('results');
            
            try {
                // Test basic connectivity
                const response = await fetch(CONVEX_URL + '/api/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        path: 'test.ping',
                        args: {}
                    })
                });
                
                if (response.ok) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ Convex backend is connected and responding!';
                    
                    resultsDiv.innerHTML = `
                        <h2>Connection Details:</h2>
                        <ul>
                            <li><strong>Convex URL:</strong> ${CONVEX_URL}</li>
                            <li><strong>Status:</strong> Connected</li>
                            <li><strong>Response Status:</strong> ${response.status}</li>
                        </ul>
                        
                        <h2>Available Features:</h2>
                        <ul>
                            <li>✅ Vendor Dashboard</li>
                            <li>✅ Supplier Dashboard</li>
                            <li>✅ AI Inventory Forecasting</li>
                            <li>✅ Voice Query System</li>
                            <li>✅ Authentication System</li>
                            <li>✅ Order Management</li>
                            <li>✅ Group Orders</li>
                            <li>✅ FSSAI Verification</li>
                        </ul>
                        
                        <h2>Next Steps:</h2>
                        <ol>
                            <li>Start the development server: <code>npm run dev</code></li>
                            <li>Visit <a href="http://localhost:5173">http://localhost:5173</a></li>
                            <li>Create a vendor or supplier account</li>
                            <li>Test the AI forecasting features</li>
                        </ol>
                    `;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Connection failed: ${error.message}`;
                
                resultsDiv.innerHTML = `
                    <h2>Troubleshooting:</h2>
                    <ol>
                        <li>Make sure Convex is deployed: <code>npx convex dev</code></li>
                        <li>Check your .env.local file has the correct VITE_CONVEX_URL</li>
                        <li>Verify your internet connection</li>
                        <li>Check the Convex dashboard for deployment status</li>
                    </ol>
                `;
            }
        }
        
        testConnection();
    </script>
</body>
</html>
